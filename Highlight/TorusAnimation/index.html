<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torus Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #101010; }
    #scene-root { position: relative; width: 100%; height: 100%; }
    #scene-root canvas { display: block; }
    #label-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="scene-root">
    <div id="label-layer"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
  <script>
    const container = document.getElementById("scene-root");
    const labelLayer = document.getElementById("label-layer");

    // --- Renderer ---
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setClearColor(0x101010, 1);
    container.insertBefore(renderer.domElement, labelLayer);

    // --- Scene ---
    const scene = new THREE.Scene();

    // --- Camera (fixed isometric-style perspective, no controls) ---
    const camera = new THREE.PerspectiveCamera(
      45,
      container.clientWidth / container.clientHeight,
      0.1,
      1000
    );

    camera.position.set(15, 15, -13);
    camera.lookAt(0, 0, 0);

    // --- XYZ reference planes (origin-centered, border only, solid, no fill) ---
    const GRID_COLOR = 0x606060;
    const GRID_SIZE = 10;
    const DASH = 0.12;
    const GAP  = 0.08;
    const h = GRID_SIZE / 2;

    function buildPlaneBorder(corners) {
      const pos = [...corners.flatMap(c => c), ...corners[0]];
      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
      const mat = new THREE.LineBasicMaterial({ color: GRID_COLOR });
      return new THREE.Line(geo, mat);
    }

    scene.add(buildPlaneBorder([[-h,0,-h],[h,0,-h],[h,0,h],[-h,0,h]]));        // XZ floor
    scene.add(buildPlaneBorder([[-h,-h,0],[h,-h,0],[h,h,0],[-h,h,0]]));        // XY front wall
    scene.add(buildPlaneBorder([[0,-h,-h],[0,h,-h],[0,h,h],[0,-h,h]]));        // YZ side wall

    // --- Phase 1 geometry ---

    // XZ floor fill
    const floorFillMat = new THREE.MeshBasicMaterial({ color: 0x222222, transparent: true, opacity: 0, side: THREE.DoubleSide });
    const floorFill = new THREE.Mesh(new THREE.PlaneGeometry(GRID_SIZE, GRID_SIZE), floorFillMat);
    floorFill.rotation.x = -Math.PI / 2;
    scene.add(floorFill);

    // X axis line (world X, at y=0 z=0) — dashed
    const xAxisGeo = new THREE.BufferGeometry();
    xAxisGeo.setAttribute("position", new THREE.Float32BufferAttribute([-h, 0, 0, h, 0, 0], 3));
    const xAxisMat = new THREE.LineDashedMaterial({ color: 0x595959, dashSize: DASH, gapSize: GAP, transparent: true, opacity: 0 });
    const xAxisLine = new THREE.Line(xAxisGeo, xAxisMat);
    xAxisLine.computeLineDistances();
    scene.add(xAxisLine);

    // Z axis line (world Z, at y=0 x=0) — dashed
    const zAxisGeo = new THREE.BufferGeometry();
    zAxisGeo.setAttribute("position", new THREE.Float32BufferAttribute([0, 0, -h, 0, 0, h], 3));
    const zAxisMat = new THREE.LineDashedMaterial({ color: 0x595959, dashSize: DASH, gapSize: GAP, transparent: true, opacity: 0 });
    const zAxisLine = new THREE.Line(zAxisGeo, zAxisMat);
    zAxisLine.computeLineDistances();
    scene.add(zAxisLine);

    // --- Phase 2 geometry ---
    const D_XZ     = 3.5;
    const RL       = 1.1;
    const GREEN    = 0x5adc8c;
    const DIM_COLOR = 0xff8c3a;
    const p2proxy  = { z: 0, rl: RL };

    // Center reference line (along X at z=0)
    const refLineGeo = new THREE.BufferGeometry();
    refLineGeo.setAttribute("position", new THREE.Float32BufferAttribute([-h, 0, 0, h, 0, 0], 3));
    const refLineMat = new THREE.LineDashedMaterial({ color: 0x666666, dashSize: 0.12, gapSize: 0.08, transparent: true, opacity: 0 });
    const refLine = new THREE.Line(refLineGeo, refLineMat);
    refLine.computeLineDistances();
    scene.add(refLine);

    // RP lines (dashed green, parallel to X, travel out to z=±D_XZ)
    // Stacked at multiple Y offsets to fake visual thickness
    const rpMat = new THREE.LineDashedMaterial({ color: GREEN, dashSize: 0.18, gapSize: 0.10, transparent: true, opacity: 0 });
    const RP_Y = [-0.04, -0.02, 0, 0.02, 0.04];

    function makeRPLineSet() {
      return RP_Y.map(y => {
        const pos = new Float32Array([-RL, y, 0, RL, y, 0]);
        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        const line = new THREE.Line(geo, rpMat);
        line.computeLineDistances();
        scene.add(line);
        return { pos, geo, line };
      });
    }
    const rpLines1 = makeRPLineSet();
    const rpLines2 = makeRPLineSet();

    // Dot markers — one at each endpoint of each RP line (4 total)
    const dotGeo = new THREE.SphereGeometry(0.10, 8, 8);
    const dotMat = new THREE.MeshBasicMaterial({ color: GREEN, transparent: true, opacity: 0 });
    const dots = Array.from({ length: 4 }, () => new THREE.Mesh(dotGeo, dotMat));
    for (const d of dots) scene.add(d);

    // --- Phase 2 dimension indicators ---
    // dimX = rl + 0.15 (tracks current rl each frame — updated in updateP2Geometry)
    const TICK_LEN = 0.12;
    const TH = TICK_LEN / 2;

    const dim2Mat  = new THREE.LineBasicMaterial({ color: DIM_COLOR, transparent: true, opacity: 0 });
    const tick2Mat = new THREE.LineBasicMaterial({ color: DIM_COLOR, transparent: true, opacity: 0 });

    function drawRoundedRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
      ctx.fill();
    }

    function makeDimSprite(tagText) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 128;
      const ctx = canvas.getContext("2d");
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = false;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        opacity: 0,
        depthTest: false,
        depthWrite: false
      });
      const sprite = new THREE.Sprite(material);
      sprite.renderOrder = 10;
      sprite.scale.set(2.2, 0.55, 1);

      function setValue(valueText) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#181818";
        drawRoundedRect(ctx, 0, 0, 340, 128, 20);
        ctx.fillStyle = "#000000";
        drawRoundedRect(ctx, 212, 0, 300, 128, 20);
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 2;
        ctx.strokeRect(214, 2, 296, 124);

        ctx.fillStyle = "#a2a2a2";
        ctx.font = "500 54px Roboto, sans-serif";
        ctx.textBaseline = "middle";
        ctx.fillText(valueText, 24, 64);

        ctx.fillStyle = "#ffffff";
        ctx.font = "500 46px Roboto, sans-serif";
        ctx.fillText(tagText, 238, 64);

        texture.needsUpdate = true;
      }

      setValue("0.0");
      return { sprite, material, setValue };
    }

    // Dimension line — continuous along Z, anchored at x = -(rl + 0.15) (negative X side)
    const dim2Pos = new Float32Array([-(RL + 0.15), 0, 0, -(RL + 0.15), 0, 0]);
    const dim2Geo = new THREE.BufferGeometry();
    dim2Geo.setAttribute("position", new THREE.BufferAttribute(dim2Pos, 3));
    scene.add(new THREE.Line(dim2Geo, dim2Mat));

    // Tick marks — perpendicular to Z (along X), centered on dim line
    // End ticks are mutable so they can track dimX each frame
    const tick2EndPos1 = new Float32Array([-(RL + 0.15) - TH, 0, 0, -(RL + 0.15) + TH, 0, 0]);
    const tick2EndGeo1 = new THREE.BufferGeometry();
    tick2EndGeo1.setAttribute("position", new THREE.BufferAttribute(tick2EndPos1, 3));
    scene.add(new THREE.Line(tick2EndGeo1, tick2Mat));

    const tick2EndPos2 = new Float32Array([-(RL + 0.15) - TH, 0, 0, -(RL + 0.15) + TH, 0, 0]);
    const tick2EndGeo2 = new THREE.BufferGeometry();
    tick2EndGeo2.setAttribute("position", new THREE.BufferAttribute(tick2EndPos2, 3));
    scene.add(new THREE.Line(tick2EndGeo2, tick2Mat));

    const dim2Label = makeDimSprite("LENGTH");
    scene.add(dim2Label.sprite);

    // --- Phase 3 geometry (Phase 2 mirrored to X axis) ---
    const p3proxy = { x: 0, rl: RL };

    // Center reference line for Phase 3 (along Z at x=0)
    const refLine3Geo = new THREE.BufferGeometry();
    refLine3Geo.setAttribute("position", new THREE.Float32BufferAttribute([0, 0, -h, 0, 0, h], 3));
    const refLineMat3 = new THREE.LineDashedMaterial({ color: 0x666666, dashSize: 0.12, gapSize: 0.08, transparent: true, opacity: 0 });
    const refLine3 = new THREE.Line(refLine3Geo, refLineMat3);
    refLine3.computeLineDistances();
    scene.add(refLine3);

    // RP lines for Phase 3 (parallel to Z, travel out to x=±D_XZ)
    const rpMat3 = new THREE.LineDashedMaterial({ color: GREEN, dashSize: 0.18, gapSize: 0.10, transparent: true, opacity: 0 });
    function makeRPLineSetZ() {
      return RP_Y.map(y => {
        const pos = new Float32Array([0, y, -RL, 0, y, RL]);
        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        const line = new THREE.Line(geo, rpMat3);
        line.computeLineDistances();
        scene.add(line);
        return { pos, geo, line };
      });
    }
    const rpLines3_1 = makeRPLineSetZ();
    const rpLines3_2 = makeRPLineSetZ();

    // Dot markers for Phase 3
    const dotMat3 = new THREE.MeshBasicMaterial({ color: GREEN, transparent: true, opacity: 0 });
    const dots3 = Array.from({ length: 4 }, () => new THREE.Mesh(dotGeo, dotMat3));
    for (const d of dots3) scene.add(d);

    // --- Phase 3 dimension indicators ---
    // dimZ = rl + 0.15 (tracks current rl each frame — updated in updateP3Geometry)
    const dim3Mat  = new THREE.MeshBasicMaterial({ color: DIM_COLOR, transparent: true, opacity: 0 });
    const tick3Mat = new THREE.LineBasicMaterial({ color: DIM_COLOR, transparent: true, opacity: 0 });

    // Dimension bar — continuous solid along X, anchored at z = -(rl + 0.15)
    const dim3Geo = new THREE.BoxGeometry(1, 0.015, 0.015);
    const dim3Bar = new THREE.Mesh(dim3Geo, dim3Mat);
    dim3Bar.position.set(0, 0, -(RL + 0.15));
    dim3Bar.scale.x = 0.0001;
    scene.add(dim3Bar);

    // Tick marks — perpendicular to X (along Z), mutable to track dimZ
    const tick3EndPos1 = new Float32Array([0, 0, -(RL + 0.15) - TH, 0, 0, -(RL + 0.15) + TH]);
    const tick3EndGeo1 = new THREE.BufferGeometry();
    tick3EndGeo1.setAttribute("position", new THREE.BufferAttribute(tick3EndPos1, 3));
    scene.add(new THREE.Line(tick3EndGeo1, tick3Mat));

    const tick3EndPos2 = new Float32Array([0, 0, -(RL + 0.15) - TH, 0, 0, -(RL + 0.15) + TH]);
    const tick3EndGeo2 = new THREE.BufferGeometry();
    tick3EndGeo2.setAttribute("position", new THREE.BufferAttribute(tick3EndPos2, 3));
    scene.add(new THREE.Line(tick3EndGeo2, tick3Mat));

    // --- Per-frame geometry sync ---
    function updateP2Geometry() {
      const z  = p2proxy.z;
      const rl = p2proxy.rl;

      for (const { pos, geo, line } of rpLines1) {
        pos[0] = -rl; pos[2] =  z; pos[3] = rl; pos[5] =  z;
        geo.attributes.position.needsUpdate = true;
        line.computeLineDistances();
      }
      for (const { pos, geo, line } of rpLines2) {
        pos[0] = -rl; pos[2] = -z; pos[3] = rl; pos[5] = -z;
        geo.attributes.position.needsUpdate = true;
        line.computeLineDistances();
      }

      dots[0].position.set( rl, 0,  z);
      dots[1].position.set(-rl, 0,  z);
      dots[2].position.set( rl, 0, -z);
      dots[3].position.set(-rl, 0, -z);

      // Dim lines anchor at x = -(rl + 0.15), grow along Z
      const dimX = -(rl + 0.15);
      dim2Pos[0] = dimX; dim2Pos[2] = -z;
      dim2Pos[3] = dimX; dim2Pos[5] =  z;
      dim2Geo.attributes.position.needsUpdate = true;

      // End ticks track both dimX and current z
      tick2EndPos1[0] = dimX - TH; tick2EndPos1[3] = dimX + TH;
      tick2EndPos1[2] =  z;        tick2EndPos1[5] =  z;
      tick2EndGeo1.attributes.position.needsUpdate = true;

      tick2EndPos2[0] = dimX - TH; tick2EndPos2[3] = dimX + TH;
      tick2EndPos2[2] = -z;        tick2EndPos2[5] = -z;
      tick2EndGeo2.attributes.position.needsUpdate = true;

      dim2Label.sprite.position.set(dimX, 0.32, 0);
      dim2Label.setValue((2 * z).toFixed(1));

    }

    function updateP3Geometry() {
      const x  = p3proxy.x;
      const rl = p3proxy.rl;

      for (const { pos, geo, line } of rpLines3_1) {
        pos[0] =  x; pos[2] = -rl; pos[3] =  x; pos[5] = rl;
        geo.attributes.position.needsUpdate = true;
        line.computeLineDistances();
      }
      for (const { pos, geo, line } of rpLines3_2) {
        pos[0] = -x; pos[2] = -rl; pos[3] = -x; pos[5] = rl;
        geo.attributes.position.needsUpdate = true;
        line.computeLineDistances();
      }

      dots3[0].position.set( x, 0,  rl);
      dots3[1].position.set( x, 0, -rl);
      dots3[2].position.set(-x, 0,  rl);
      dots3[3].position.set(-x, 0, -rl);

      // Dim lines anchor at z = -(rl + 0.15), grow along X
      const dimZ = -(rl + 0.15);
      dim3Bar.position.z = dimZ;
      dim3Bar.scale.x = Math.max(2 * x, 0.0001);

      // End ticks track both dimZ and current x
      tick3EndPos1[2] = dimZ - TH; tick3EndPos1[5] = dimZ + TH;
      tick3EndPos1[0] =  x;        tick3EndPos1[3] =  x;
      tick3EndGeo1.attributes.position.needsUpdate = true;

      tick3EndPos2[2] = dimZ - TH; tick3EndPos2[5] = dimZ + TH;
      tick3EndPos2[0] = -x;        tick3EndPos2[3] = -x;
      tick3EndGeo2.attributes.position.needsUpdate = true;

    }

    // --- Master timeline (loops forever) ---
    const P1 = 0.5;   // phase 1 start
    const P2 = 0.5;   // phase 2 starts simultaneously with phase 1
    const P3 = 0.8;   // phase 3 starts 0.3s after phase 2
    const P2_GROW_END = P2 + 0.4 + 0.7;  // when Phase 2 RP lines finish growing
    const P3_GROW_END = P3 + 0.4 + 0.7;  // when Phase 3 RP lines finish growing

    const master = gsap.timeline({ repeat: -1 });

    // Reset all animated values at the top of every loop
    master
      .set([floorFillMat, xAxisMat, zAxisMat,
            refLineMat, rpMat, dotMat, dim2Mat, tick2Mat,
            refLineMat3, rpMat3, dotMat3, dim3Mat, tick3Mat], { opacity: 0 }, 0)
      .set(dim2Label.material, { opacity: 0 }, 0)

    // Phase 1
      .to(floorFillMat, { opacity: 1, duration: 1,   ease: "power2.inOut" }, P1)
      .to(xAxisMat,     { opacity: 1, duration: 0.8, ease: "power2.inOut" }, P1 + 0.3)
      .to(zAxisMat,     { opacity: 1, duration: 0.8, ease: "power2.inOut" }, P1 + 0.3)

    // Phase 2
      .to(refLineMat, { opacity: 0.5, duration: 0.4, ease: "power2.inOut" }, P2)
      .to(rpMat,      { opacity: 0.9, duration: 0.3, ease: "power2.inOut" }, P2 + 0.4)
      .to(dotMat,     { opacity: 0.9, duration: 0.3, ease: "power2.inOut" }, P2 + 0.4)
      .to(dim2Mat,    { opacity: 1,   duration: 0.3, ease: "power2.inOut" }, P2 + 0.4)
      .fromTo(p2proxy, { z: 0, rl: RL }, {
        z: D_XZ,
        rl: 4.0,
        duration: 0.7,
        ease: "power2.inOut",
        onStart: updateP2Geometry,
        onUpdate: updateP2Geometry,
      }, P2 + 0.4)
      .to(tick2Mat, { opacity: 1, duration: 0.3, ease: "power2.inOut" }, P2_GROW_END)
      .to(dim2Label.material, { opacity: 1, duration: 0.25, ease: "power2.inOut" }, P2_GROW_END + 0.1)

    // Phase 3
      .to(refLineMat3, { opacity: 0.5, duration: 0.4, ease: "power2.inOut" }, P3)
      .to(rpMat3,      { opacity: 0.9, duration: 0.3, ease: "power2.inOut" }, P3 + 0.4)
      .to(dotMat3,     { opacity: 0.9, duration: 0.3, ease: "power2.inOut" }, P3 + 0.4)
      .to(dim3Mat,     { opacity: 1,   duration: 0.3, ease: "power2.inOut" }, P3 + 0.4)
      .fromTo(p3proxy, { x: 0, rl: RL }, {
        x: D_XZ,
        rl: 4.0,
        duration: 0.7,
        ease: "power2.inOut",
        onStart: updateP3Geometry,
        onUpdate: updateP3Geometry,
      }, P3 + 0.4)
      .to(tick3Mat, { opacity: 1, duration: 0.3, ease: "power2.inOut" }, P3_GROW_END)

    // Hold at end before looping
      .to({}, { duration: 0.8 });

    // --- Resize ---
    window.addEventListener("resize", () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    // --- Render loop ---
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
