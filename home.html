<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Case Study</title>
    <link rel="icon" type="image/svg+xml" href="/Assets/Favicon.svg" />
    <link rel="stylesheet" href="/Live/main/tokens.css" />
    <link rel="stylesheet" href="/Live/main/typography.css" />
    <link rel="stylesheet" href="/Live/main/layout.css" />
    <link rel="stylesheet" href="/Live/intro/intro.css" />
    <link rel="stylesheet" href="/Live/workflow-cards/workflow-cards.css" />
    <link rel="stylesheet" href="/Live/caseStudyCard/caseStudyCard.css" />
    <link rel="stylesheet" href="/Live/homeNav.css" />
  </head>
  <body data-homenav>
    <main class="live-main">
      <canvas id="smoke"></canvas>
      <header class="intro-section" aria-labelledby="intro-title">
        <div class="intro-group">
          <div class="intro-texts">
            <h1 class="intro-title" id="intro-title">John Sun</h1>
            <p class="intro-role">product designer in San Francisco</p>
            <p class="intro-subtitle">
              I research, design, and make code prototypes. I use Figma-MCP to produce design-side code to close the consistency gap.
            </p>
            <div class="intro-button">See Design Process</div>
          </div>
        </div>
      </header>

      <div class="workflow-cards">
        <workflow-card title="Research" body="User interviews, discuss with sales, market analysis">
          <iso-tile icon="/Assets/IsoTile/UserResearch.svg"></iso-tile>
        </workflow-card>
        <workflow-card title="Design" body="Ideate with AI, refine in Figma">
          <iso-tile icon="/Assets/IsoTile/Web.svg"></iso-tile>
          <iso-tile icon="/Assets/IsoTile/Figma.svg"></iso-tile>
        </workflow-card>
        <workflow-card title="Extract" body="Call MCP with Claude Code for components & CSS tokens">
          <iso-tile icon="/Assets/IsoTile/MCP.svg"></iso-tile>
          <iso-tile icon="/Assets/IsoTile/Claude.svg"></iso-tile>
        </workflow-card>
        <workflow-card title="Prototype" body="Develop Storybook library and code prototype as source of truth">
          <iso-tile icon="/Assets/IsoTile/Storybook.svg"></iso-tile>
          <iso-tile icon="/Assets/IsoTile/VSC.svg"></iso-tile>
        </workflow-card>
      </div>

      <div class="case-study-showcase">
        <section class="case-study-all" id="case-studies-root" aria-label="Case Studies"></section>
      </div>
    </main>

    <script src="/Live/homeNav.js" defer></script>
    <script src="/Live/iso-tile/iso-tile.js" defer></script>
    <script src="/Live/workflow-card/workflow-card.js" defer></script>
    <script src="/Live/primitives.js" defer></script>
    <script src="/Live/caseStudyCard/caseStudyCardData.js" defer></script>
    <script src="/Live/caseStudyCard/caseStudyCard.js" defer></script>
    <script src="/Live/intro/smokeBlade.js" defer></script>
    <script src="/Live/intro/intro.js" defer></script>
  </body>
</html>
