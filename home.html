<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Case Study</title>
    <link rel="icon" type="image/svg+xml" href="/Assets/Favicon.svg" />
    <link rel="stylesheet" href="/Live/main/tokens.css" />
    <link rel="stylesheet" href="/Live/main/typography.css" />
    <link rel="stylesheet" href="/Live/main/layout.css" />
    <link rel="stylesheet" href="/Live/caseStudyCard/caseStudyCard.css" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net/npm" crossorigin />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.173.0/build/three.module.min.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="live-main">
      <header class="intro-div" aria-labelledby="intro-title">
        <div class="intro-content">
          <div class="intro-media-mount" aria-hidden="true">
            <img class="intro-media-image" src="/Assets/JSLogo.svg" alt="" />
          </div>
          <div class="intro-texts-group">
            <h1 class="intro-title" id="intro-title">John Sun</h1>
            <p class="intro-subtitle">
              I'm a product designer based in San Francisco. I'm currently obsessed with the Figma MCP and agentic design-to-code workflows, so I built this
              portfolio with it.
            </p>
          </div>
        </div>
        <button
          type="button"
          class="intro-scroll-indicator"
          aria-label="Scroll to case studies"
        ></button>
      </header>
      <div class="case-study-showcase">
        <div class="case-study-nav-div" aria-label="Case Study Navigation"></div>
        <section class="case-study-all" id="case-studies-root" aria-label="Case Studies"></section>
      </div>
    </main>
    <script src="/Live/primitives.js" defer></script>
    <script src="/Live/caseStudyCard/caseStudyCardData.js" type="module"></script>
    <script src="/Live/main/script.js" defer></script>
    <script src="/Live/caseStudyCard/caseStudyCard.js" defer></script>
  </body>
</html>
